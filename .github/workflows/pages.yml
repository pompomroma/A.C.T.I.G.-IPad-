name: Deploy A.C.T.I.G. PWA to GitHub Pages

# Publishes the web/ PWA over HTTPS so it can be installed on iPhone/iPad
# (camera, microphone, WebGPU and offline service workers all require HTTPS).
#
# One-time setup: in the repo, go to Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that, every push to the default branch (or a
# manual run) publishes the site and prints its https URL in the job summary.

on:
  push:
    branches: ["main", "claude/actig-offline-ai-assistant-fq65vo"]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (and auto-enable) GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enables Pages on the repo if it isn't enabled yet, so the
          # deploy no longer fails with "Get Pages site failed / Not Found".
          enablement: true
      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
