name: Deploy A.C.T.I.G. PWA to GitHub Pages

# Publishes the web/ PWA over HTTPS so it can be installed on iPhone/iPad
# (camera, microphone, WebGPU and offline service workers all require HTTPS).
#
# ONE-TIME SETUP (only you can do this — the workflow token cannot enable Pages):
#   1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. If a run shows "Resource not accessible by integration", also set
#      Settings → Actions → General → Workflow permissions → "Read and write".
# After that, this workflow deploys on every push to the default branch (or a
# manual run) and prints the site's https URL in the job summary.

on:
  push:
    branches: ["main", "claude/actig-offline-ai-assistant-fq65vo"]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        # No `enablement` here: the default token isn't allowed to create a Pages
        # site (that caused "Resource not accessible by integration"). Enable
        # Pages once in Settings (see header), then this step just reads config.
        uses: actions/configure-pages@v5
      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
